version: 2

project_name: sweb

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - bash -c 'for sh in bash zsh fish; do go run . completion "$sh" > "completions/sweb.$sh"; done'

builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/sanchpet/sweb/internal/cmd.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - completions/*

checksum:
  name_template: checksums.txt

nfpms:
  - maintainer: Aleksandr Petrov
    description: CLI for the SpaceWeb (sweb.ru) hosting API
    license: MIT
    formats: [deb, rpm]
    contents:
      - src: ./completions/sweb.bash
        dst: /usr/share/bash-completion/completions/sweb
      - src: ./completions/sweb.zsh
        dst: /usr/share/zsh/site-functions/_sweb
      - src: ./completions/sweb.fish
        dst: /usr/share/fish/vendor_completions.d/sweb.fish

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: sanchpet
    name: sweb

[tools]
go = "1.26"
golangci-lint = "2"
pre-commit = "latest"
goreleaser = "2"

[tasks.build]
description = "Build the sweb binary"
run = "go build -o dist/sweb ."

[tasks.test]
description = "Run the test suite"
run = "go test ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format Go sources"
run = "gofmt -w ."

[tasks.ci]
description = "Everything CI runs"
depends = ["lint", "test", "build"]

[tasks.release-snapshot]
description = "Build a local release snapshot (no publish)"
run = "goreleaser release --snapshot --clean"
